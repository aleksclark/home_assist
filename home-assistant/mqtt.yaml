climate:
  - name: "Livingroom AC"
    unique_id: "livingroom_ac"
    temperature_unit: C
    modes: &della_modes
      - "off"
      - "cool"
      - "heat"
      - "dry"
      - "fan_only"
      - "auto"
    fan_modes: &della_fan_modes
      - "1"
      - "2"
      - "3"
      - "4"
      - "5"
      - "mute"
      - "turbo"
      - "auto"
    swing_modes: &della_swing_modes
      - "none"
      - "move_full"
      - "move_upper"
      - "move_lower"
      - "fix_top"
      - "fix_upper"
      - "fix_mid"
      - "fix_lower"
      - "fix_bottom"
    mode_state_template: &della_mode_template "{{ value if value != 'fan' else 'fan_only' }}"
    min_temp: 16
    max_temp: 30
    temp_step: 1
    payload_available: "online"
    payload_not_available: "offline"
    mode_command_topic: "cmnd/minisplit_livingroom/ACMode"
    mode_state_topic: "minisplit_livingroom/ACMode/get"
    temperature_command_topic: "cmnd/minisplit_livingroom/TargetTemperature"
    temperature_state_topic: "minisplit_livingroom/TargetTemperature/get"
    current_temperature_topic: "minisplit_livingroom/CurrentTemperature/get"
    fan_mode_command_topic: "cmnd/minisplit_livingroom/FANMode"
    fan_mode_state_topic: "minisplit_livingroom/FANMode/get"
    swing_mode_command_topic: "cmnd/minisplit_livingroom/SwingV"
    swing_mode_state_topic: "minisplit_livingroom/SwingV/get"
    availability_topic: "minisplit_livingroom/connected"

  - name: "Kitchen AC"
    unique_id: "kitchen_ac"
    temperature_unit: C
    modes: *della_modes
    fan_modes: *della_fan_modes
    swing_modes: *della_swing_modes
    mode_state_template: *della_mode_template
    min_temp: 16
    max_temp: 30
    temp_step: 1
    payload_available: "online"
    payload_not_available: "offline"
    mode_command_topic: "cmnd/minisplit_kitchen/ACMode"
    mode_state_topic: "minisplit_kitchen/ACMode/get"
    temperature_command_topic: "cmnd/minisplit_kitchen/TargetTemperature"
    temperature_state_topic: "minisplit_kitchen/TargetTemperature/get"
    current_temperature_topic: "minisplit_kitchen/CurrentTemperature/get"
    fan_mode_command_topic: "cmnd/minisplit_kitchen/FANMode"
    fan_mode_state_topic: "minisplit_kitchen/FANMode/get"
    swing_mode_command_topic: "cmnd/minisplit_kitchen/SwingV"
    swing_mode_state_topic: "minisplit_kitchen/SwingV/get"
    availability_topic: "minisplit_kitchen/connected"
