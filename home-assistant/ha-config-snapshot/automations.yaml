- id: hvac_kitchen_schedule
  alias: HVAC Kitchen - Schedule Control
  description: Controls kitchen AC based on 4-period daily schedule. Uses direct MQTT
    to avoid entity conflicts.
  triggers:
  - at: 05:30:00
    trigger: time
  - at: 06:30:00
    trigger: time
  - at: 08:30:00
    trigger: time
  - at: '21:00:00'
    trigger: time
  - minutes: /10
    trigger: time_pattern
  conditions:
  - condition: state
    entity_id: input_boolean.hvac_master_enable
    state: 'on'
  actions:
  - variables:
      current_temp: '{{ state_attr(''climate.kitchen_ac'', ''current_temperature'')
        | float(0) }}'
      now_minutes: '{{ now().hour * 60 + now().minute }}'
  - variables:
      cool_max: '{% if 330 <= now_minutes < 390 %}{{ states(''input_number.hvac_early_morning_cool_f'')
        | int }}{% elif 390 <= now_minutes < 510 %}{{ states(''input_number.hvac_morning_cool_f'')
        | int }}{% elif 510 <= now_minutes < 1260 %}{{ states(''input_number.hvac_daytime_cool_f'')
        | int }}{% else %}{{ states(''input_number.hvac_overnight_cool_f'') | int
        }}{% endif %}'
      heat_min: '{% if 330 <= now_minutes < 390 %}{{ states(''input_number.hvac_early_morning_heat_f'')
        | int }}{% elif 390 <= now_minutes < 510 %}{{ states(''input_number.hvac_morning_heat_f'')
        | int }}{% elif 510 <= now_minutes < 1260 %}{{ states(''input_number.hvac_daytime_heat_f'')
        | int }}{% else %}{{ states(''input_number.hvac_overnight_heat_f'') | int
        }}{% endif %}'
  - variables:
      cool_max_c: '{{ ((cool_max - 32) * 5 / 9) | round(0) | int }}'
      heat_min_c: '{{ ((heat_min - 32) * 5 / 9) | round(0) | int }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ current_temp <= heat_min }}'
      sequence:
      - action: mqtt.publish
        data:
          payload: heat
          topic: cmnd/minisplit_kitchen/ACMode
      - action: mqtt.publish
        data:
          payload: '{{ heat_min_c }}'
          topic: cmnd/minisplit_kitchen/TargetTemperature
    - conditions:
      - condition: template
        value_template: '{{ current_temp >= cool_max }}'
      sequence:
      - action: mqtt.publish
        data:
          payload: cool
          topic: cmnd/minisplit_kitchen/ACMode
      - action: mqtt.publish
        data:
          payload: '{{ cool_max_c }}'
          topic: cmnd/minisplit_kitchen/TargetTemperature
    default:
    - action: mqtt.publish
      data:
        payload: 'off'
        topic: cmnd/minisplit_kitchen/ACMode
