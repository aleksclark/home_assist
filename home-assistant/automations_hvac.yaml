# ===========================================================================
#  CENTRAL AC (Ecobee) — serves hallway, girls_bedroom, girls_bathroom,
#  ak_bedroom.  The thermostat lives in the hallway.
# ===========================================================================
# The ecobee is set to the most-demanding zone's target for the current
# time slot.  ak_bedroom is occupied longest (05:00-21:00), so its
# schedule drives the central system during the day.
# Girls_bedroom has the latest sleep window (22:00-05:00).

- alias: "HVAC Central - Occupied Start (AK Morning)"
  id: hvac_central_occupied_start
  triggers:
    - trigger: time
      at: "05:00:00"
  conditions:
    - condition: state
      entity_id: input_boolean.hvac_master_enable
      state: "on"
  actions:
    - action: climate.set_temperature
      target:
        entity_id: climate.my_ecobee_2
      data:
        temperature: >
          {% if is_state('input_boolean.hvac_season_cool', 'on') %}
            {{ states('input_number.hvac_occupied_cool_f') | float }}
          {% else %}
            {{ states('input_number.hvac_occupied_heat_f') | float }}
          {% endif %}
        hvac_mode: >
          {% if is_state('input_boolean.hvac_season_cool', 'on') %}cool{% else %}heat{% endif %}

- alias: "HVAC Central - Sleep Start (AK Bedtime)"
  id: hvac_central_sleep_start
  triggers:
