# ---------------------------------------------------------------------------
# HVAC Zone Automations
# ---------------------------------------------------------------------------
# Drives the 3 Della minisplits + hallway thermostat from a 4-period
# daily schedule.  All setpoints in Fahrenheit; Della units receive
# Celsius via direct MQTT (F→C conversion in templates).
#
# Thermostats:
#   climate.kitchen_ac        — Della 18k BTU (MQTT, cmnd/minisplit_kitchen/)
#   climate.amos_bedroom_ac   — Della 9k BTU  (MQTT, cmnd/minisplit_amos/)
#   climate.livingroom_ac     — Della 12k BTU (MQTT, cmnd/minisplit_livingroom/) — thermal tracking only
#   climate.smart_thermostat  — Hallway thermostat (Matter) — heat_cool dual setpoint
#
# Schedule periods (driven by input_number helpers):
#   early_morning : 05:30 – 06:30
#   morning       : 06:30 – 08:30
#   daytime       : 08:30 – 21:00
#   overnight     : 21:00 – 05:30
#
# Della logic (kitchen, amos):
#   current_temp <= heat_min - deadband → heat mode, setpoint = heat_min (Celsius)
#   current_temp >= cool_max + deadband → cool mode, setpoint = cool_max (Celsius)
#   within band                         → off
#
# Deadband: 1.5°F hysteresis prevents rapid cycling when temp oscillates
# around a setpoint boundary.  The unit must overshoot by 1.5°F before
# the automation switches modes.
#
# Hallway logic:
#   heat_cool mode with target_temp_low / target_temp_high (native HA, no MQTT)
#
# Livingroom: not occupied, kept within ±band of avg(kitchen, amos) temps.
#
# IMPORTANT: Variables that depend on other variables (heat_min/cool_max
# depend on now_minutes) must be in a SEPARATE variables block.  HA
# evaluates all variables within a single block in undefined order.
# ---------------------------------------------------------------------------

# ===========================================================================
#  KITCHEN — schedule-driven heat/cool band
# ===========================================================================

- alias: "HVAC Kitchen - Schedule Control"
  id: hvac_kitchen_schedule
  description: >
    Controls kitchen AC based on 4-period daily schedule.
    Uses direct MQTT to avoid entity conflicts.
    1.5°F deadband prevents rapid cycling.
  triggers:
    - trigger: time
      at: "05:30:00"
    - trigger: time
      at: "06:30:00"
    - trigger: time
      at: "08:30:00"
    - trigger: time
      at: "21:00:00"
    - trigger: time_pattern
      minutes: "/10"
  conditions:
    - condition: state
      entity_id: input_boolean.hvac_master_enable
      state: "on"
  actions:
    - variables:
        current_temp: >
          {{ state_attr('climate.kitchen_ac', 'current_temperature') | float(0) }}
        now_minutes: >
          {{ now().hour * 60 + now().minute }}
        deadband: 1.5
    - variables:
        heat_min: >
          {% if 330 <= now_minutes < 390 %}
            {{ states('input_number.hvac_early_morning_heat_f') | int }}
          {% elif 390 <= now_minutes < 510 %}
            {{ states('input_number.hvac_morning_heat_f') | int }}
          {% elif 510 <= now_minutes < 1260 %}
            {{ states('input_number.hvac_daytime_heat_f') | int }}
          {% else %}
            {{ states('input_number.hvac_overnight_heat_f') | int }}
          {% endif %}
        cool_max: >
          {% if 330 <= now_minutes < 390 %}
            {{ states('input_number.hvac_early_morning_cool_f') | int }}
          {% elif 390 <= now_minutes < 510 %}
            {{ states('input_number.hvac_morning_cool_f') | int }}
          {% elif 510 <= now_minutes < 1260 %}
            {{ states('input_number.hvac_daytime_cool_f') | int }}
          {% else %}
            {{ states('input_number.hvac_overnight_cool_f') | int }}
          {% endif %}
    - variables:
        cool_max_c: "{{ ((cool_max - 32) * 5 / 9) | round(0) | int }}"
        heat_min_c: "{{ ((heat_min - 32) * 5 / 9) | round(0) | int }}"
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ current_temp <= (heat_min - deadband) }}"
          sequence:
            - action: mqtt.publish
              data:
                topic: cmnd/minisplit_kitchen/ACMode
                payload: heat
            - action: mqtt.publish
              data:
                topic: cmnd/minisplit_kitchen/TargetTemperature
                payload: "{{ heat_min_c }}"
        - conditions:
            - condition: template
              value_template: "{{ current_temp >= (cool_max + deadband) }}"
          sequence:
            - action: mqtt.publish
              data:
                topic: cmnd/minisplit_kitchen/ACMode
                payload: cool
            - action: mqtt.publish
              data:
                topic: cmnd/minisplit_kitchen/TargetTemperature
                payload: "{{ cool_max_c }}"
      default:
        - action: mqtt.publish
          data:
            topic: cmnd/minisplit_kitchen/ACMode
            payload: "off"

