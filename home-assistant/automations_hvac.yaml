# ---------------------------------------------------------------------------
# HVAC Zone Automations
# ---------------------------------------------------------------------------
# Drives the 3 minisplit zones + ecobee central system from zones.yaml
# schedule data.  All temperatures in Fahrenheit (HA unit system).
# Deployed via MCP save_automation API — this file is a reference copy.
#
# Add to configuration.yaml:
#   automation: !include automations_hvac.yaml
# ---------------------------------------------------------------------------

# ===========================================================================
#  MINISPLIT ZONES — schedule-driven setpoints
# ===========================================================================

# --- Kitchen (della_kitchen, 18k BTU) -----------------------------------

- alias: "HVAC Kitchen - Occupied Start"
  id: hvac_kitchen_occupied_start
  triggers:
    - trigger: time
      at: "05:00:00"
  conditions:
    - condition: state
      entity_id: input_boolean.hvac_master_enable
      state: "on"
  actions:
    - action: climate.set_temperature
      target:
        entity_id: climate.kitchen_ac
      data:
        temperature: >
          {% if is_state('input_boolean.hvac_season_cool', 'on') %}
            {{ ((states('input_number.hvac_occupied_cool_f') | float - 32) * 5/9) | round(0) }}
          {% else %}
            {{ ((states('input_number.hvac_occupied_heat_f') | float - 32) * 5/9) | round(0) }}
          {% endif %}
        hvac_mode: >
          {% if is_state('input_boolean.hvac_season_cool', 'on') %}cool{% else %}heat{% endif %}

- alias: "HVAC Kitchen - Unoccupied Start"
  id: hvac_kitchen_unoccupied_start
  triggers:
