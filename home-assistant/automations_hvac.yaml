# ---------------------------------------------------------------------------
# HVAC Zone Control — Redesigned Architecture
# ---------------------------------------------------------------------------
#
# PHILOSOPHY:
#   Use climate entities as they're intended — set the target temp and mode
#   via HA service calls, let the MQTT integration handle Celsius conversion.
#   Separate the concerns: ONE automation manages the schedule (what temp do
#   we want?), per-zone automations manage control (how do we get there?).
#
# ENTITIES:
#   climate.kitchen_ac        — Della 18k BTU (MQTT, temp unit: C)
#   climate.amos_bedroom_ac   — Della 9k BTU  (MQTT, temp unit: C)
#   climate.livingroom_ac     — Della 12k BTU (MQTT, temp unit: C)
#   climate.smart_thermostat  — Hallway (Matter, heat_cool mode)
#
# SCHEDULE:  Driven by input_number helpers.
#   early_morning : 05:30 – 06:30
#   morning       : 06:30 – 08:30
#   daytime       : 08:30 – 21:00
#   overnight     : 21:00 – 05:30
#
# APPROACH:
#   1. Schedule Dispatcher (1 automation):
#      Fires on period boundaries. Sets an input_select to the current
#      period name. This is the single source of truth for "what period
#      are we in?"
#
#   2. Zone Controllers (1 per Della zone):
#      Triggers on: period change, temperature change, setpoint change.
#      Reads heat_min/cool_max for the active period.
#      Calls climate.set_temperature / climate.set_hvac_mode on the
#      climate entity (not direct MQTT). HA handles F→C conversion.
#      Built-in deadband via template logic.
#
#   3. Hallway Controller (1 automation):
#      Same triggers. Uses heat_cool mode with dual setpoints.
#      The Matter thermostat handles its own deadband.
#
#   4. Livingroom Tracker (1 automation):
#      Unchanged concept — tracks avg of neighbor sensors.
#      But uses climate entity calls instead of MQTT.
#
#   5. Master Disable (1 automation):
#      Turns everything off.
#
# TOTAL: 6 automations (was 5, but cleaner separation of concerns)
#
# NEW HELPER: input_select.hvac_schedule_period
#   Options: early_morning, morning, daytime, overnight
#   Set by the schedule dispatcher, read by all zone controllers.
#   This eliminates the duplicated time-range templates.
# ---------------------------------------------------------------------------

# ===========================================================================
#  HELPER: input_select for active schedule period
#  (Add to configuration.yaml or input_select includes)
# ===========================================================================
# input_select:
#   hvac_schedule_period:
#     name: HVAC Schedule Period
#     options:
#       - early_morning
#       - morning
#       - daytime
#       - overnight
#     icon: mdi:clock-outline

# ===========================================================================
#  1. SCHEDULE DISPATCHER — sets the active period
# ===========================================================================

- alias: "HVAC Schedule Dispatcher"
  id: hvac_schedule_dispatcher
  description: >
    Sets input_select.hvac_schedule_period on time boundaries.
    All zone controllers read from this — no duplicated time logic.
  triggers:
    - trigger: time
      at: "05:30:00"
    - trigger: time
      at: "06:30:00"
    - trigger: time
      at: "08:30:00"
    - trigger: time
      at: "21:00:00"
    - trigger: homeassistant
      event: start
  actions:
    - variables:
        now_minutes: "{{ now().hour * 60 + now().minute }}"
        period: >
          {% if 330 <= now_minutes < 390 %}early_morning
          {% elif 390 <= now_minutes < 510 %}morning
          {% elif 510 <= now_minutes < 1260 %}daytime
          {% else %}overnight{% endif %}
    - action: input_select.select_option
      target:
        entity_id: input_select.hvac_schedule_period
      data:
        option: "{{ period }}"

# ===========================================================================
#  2. KITCHEN — zone controller
# ===========================================================================

- alias: "HVAC Kitchen - Zone Control"
  id: hvac_kitchen_zone
  description: >
    Controls kitchen AC based on active schedule period.
    Reacts to temp changes, period changes, and setpoint changes.
    2°F deadband prevents rapid cycling.
  triggers:
    # React to period changes
    - trigger: state
      entity_id: input_select.hvac_schedule_period
    # React to temperature changes (from the climate entity)
    - trigger: state
      entity_id: climate.kitchen_ac
      attribute: current_temperature
    # React to setpoint changes
    - trigger: state
      entity_id:
        - input_number.hvac_early_morning_heat_f
        - input_number.hvac_early_morning_cool_f
        - input_number.hvac_morning_heat_f
        - input_number.hvac_morning_cool_f
        - input_number.hvac_daytime_heat_f
        - input_number.hvac_daytime_cool_f
        - input_number.hvac_overnight_heat_f
        - input_number.hvac_overnight_cool_f
    # Periodic fallback in case state change events are missed
    - trigger: time_pattern
      minutes: "/15"
  conditions:
    - condition: state
      entity_id: input_boolean.hvac_master_enable
      state: "on"
    - condition: not
      conditions:
        - condition: state
          entity_id: climate.kitchen_ac
          state: "unavailable"
  actions:
    - variables:
        period: "{{ states('input_select.hvac_schedule_period') }}"
        current_temp: "{{ state_attr('climate.kitchen_ac', 'current_temperature') | float(0) }}"
        heat_min: "{{ states('input_number.hvac_' ~ period ~ '_heat_f') | float(65) }}"
        cool_max: "{{ states('input_number.hvac_' ~ period ~ '_cool_f') | float(75) }}"
        current_mode: "{{ states('climate.kitchen_ac') }}"
        deadband: 2
    - choose:
        # Below heat setpoint (with deadband if currently off)
        - conditions:
            - condition: template
              value_template: >
                {{ current_temp < heat_min and
                   (current_mode == 'heat' or current_temp <= heat_min - deadband) }}
          sequence:
            - action: climate.set_temperature
              target:
                entity_id: climate.kitchen_ac
              data:
                temperature: "{{ heat_min }}"
                hvac_mode: heat
        # Above cool setpoint (with deadband if currently off)
        - conditions:
            - condition: template
              value_template: >
                {{ current_temp > cool_max and
                   (current_mode == 'cool' or current_temp >= cool_max + deadband) }}
          sequence:
            - action: climate.set_temperature
              target:
                entity_id: climate.kitchen_ac
              data:
                temperature: "{{ cool_max }}"
                hvac_mode: cool
      # Within band — turn off
      default:
        - condition: template
          value_template: "{{ current_mode != 'off' }}"
        - action: climate.set_hvac_mode
          target:
            entity_id: climate.kitchen_ac
          data:
            hvac_mode: "off"

# ===========================================================================
#  3. AMOS BEDROOM — zone controller
# ===========================================================================

