# ---------------------------------------------------------------------------
# HVAC Zone Automations
# ---------------------------------------------------------------------------
# Drives the 3 Della minisplits + hallway thermostat from a 4-period
# daily schedule.  All temperatures in Fahrenheit (HA unit system).
# Deployed via MCP save_automation API — this file is a reference copy.
#
# Thermostats:
#   climate.kitchen_ac        — Della 18k BTU (MQTT)
#   climate.amos_bedroom_ac   — Della 9k BTU  (MQTT)
#   climate.livingroom_ac     — Della 12k BTU (MQTT) — thermal tracking only
#   climate.smart_thermostat  — Hallway thermostat (Matter) — heat_cool dual setpoint
#
# Schedule periods (applied to kitchen, amos, hallway):
#   early_morning : 05:30 – 06:30  (min 68°F, max 75°F)
#   morning       : 06:30 – 08:30  (min 63°F, max 70°F)
#   daytime       : 08:30 – 21:00  (min 68°F, max 75°F)
#   overnight     : 21:00 – 05:30  (min 62°F, max 68°F)
#
# Della logic (kitchen, amos):
#   current_temp <= heat_min → heat mode, setpoint = heat_min
#   current_temp >= cool_max → cool mode, setpoint = cool_max
#   within band              → off
#
# Hallway logic:
#   heat_cool mode with target_temp_low / target_temp_high
#
# Livingroom: not occupied, kept within ±5°F of avg(kitchen, amos) temps.
#
# IMPORTANT: Variables that depend on other variables (heat_min/cool_max
# depend on now_minutes) must be in a SEPARATE variables block.  HA
# evaluates all variables within a single block in undefined order.
# ---------------------------------------------------------------------------

# ===========================================================================
#  KITCHEN — schedule-driven heat/cool band
# ===========================================================================

- alias: "HVAC Kitchen - Schedule Control"
  id: hvac_kitchen_schedule
  description: >
    Controls kitchen AC based on 4-period daily schedule.
    Determines heat/cool mode from current temp vs schedule band.
  triggers:
    - trigger: time
      at: "05:30:00"
    - trigger: time
      at: "06:30:00"
    - trigger: time
      at: "08:30:00"
    - trigger: time
      at: "21:00:00"
    - trigger: time_pattern
      minutes: "/10"
  conditions:
    - condition: state
      entity_id: input_boolean.hvac_master_enable
      state: "on"
  actions:
    - variables:
        current_temp: >
          {{ state_attr('climate.kitchen_ac', 'current_temperature') | float(0) }}
        now_minutes: >
          {{ now().hour * 60 + now().minute }}
    - variables:
        heat_min: >
          {% if 330 <= now_minutes < 390 %}
            {{ states('input_number.hvac_early_morning_heat_f') | float }}
          {% elif 390 <= now_minutes < 510 %}
            {{ states('input_number.hvac_morning_heat_f') | float }}
          {% elif 510 <= now_minutes < 1260 %}
            {{ states('input_number.hvac_daytime_heat_f') | float }}
          {% else %}
            {{ states('input_number.hvac_overnight_heat_f') | float }}
          {% endif %}
        cool_max: >
          {% if 330 <= now_minutes < 390 %}
            {{ states('input_number.hvac_early_morning_cool_f') | float }}
          {% elif 390 <= now_minutes < 510 %}
            {{ states('input_number.hvac_morning_cool_f') | float }}
          {% elif 510 <= now_minutes < 1260 %}
            {{ states('input_number.hvac_daytime_cool_f') | float }}
          {% else %}
            {{ states('input_number.hvac_overnight_cool_f') | float }}
          {% endif %}
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ current_temp <= heat_min }}"
          sequence:
            - action: climate.set_temperature
              target:
                entity_id: climate.kitchen_ac
              data:
                temperature: "{{ heat_min }}"
                hvac_mode: heat
        - conditions:
            - condition: template
              value_template: "{{ current_temp >= cool_max }}"
          sequence:
            - action: climate.set_temperature
              target:
                entity_id: climate.kitchen_ac
              data:
                temperature: "{{ cool_max }}"
                hvac_mode: cool
      default:
        - action: climate.set_hvac_mode
          target:
            entity_id: climate.kitchen_ac
          data:
            hvac_mode: "off"

