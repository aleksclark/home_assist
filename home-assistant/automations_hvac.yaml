# ===========================================================================
#  HALLWAY — schedule-driven heat_cool dual setpoint
# ===========================================================================

- alias: "HVAC Hallway - Schedule Control"
  id: hvac_hallway_schedule
  description: >
    Controls hallway thermostat (Matter) based on 4-period daily schedule.
    Uses heat_cool mode with dual setpoints for min/max band.
    The thermostat handles its own deadband internally.
  triggers:
    - trigger: time
      at: "05:30:00"
    - trigger: time
      at: "06:30:00"
    - trigger: time
      at: "08:30:00"
    - trigger: time
      at: "21:00:00"
    - trigger: time_pattern
      minutes: "/10"
  conditions:
    - condition: state
      entity_id: input_boolean.hvac_master_enable
      state: "on"
  actions:
    - variables:
        now_minutes: >
          {{ now().hour * 60 + now().minute }}
    - variables:
        heat_min: >
          {% if 330 <= now_minutes < 390 %}
            {{ states('input_number.hvac_early_morning_heat_f') | int }}
          {% elif 390 <= now_minutes < 510 %}
            {{ states('input_number.hvac_morning_heat_f') | int }}
          {% elif 510 <= now_minutes < 1260 %}
            {{ states('input_number.hvac_daytime_heat_f') | int }}
          {% else %}
            {{ states('input_number.hvac_overnight_heat_f') | int }}
          {% endif %}
        cool_max: >
          {% if 330 <= now_minutes < 390 %}
            {{ states('input_number.hvac_early_morning_cool_f') | int }}
          {% elif 390 <= now_minutes < 510 %}
            {{ states('input_number.hvac_morning_cool_f') | int }}
          {% elif 510 <= now_minutes < 1260 %}
            {{ states('input_number.hvac_daytime_cool_f') | int }}
          {% else %}
            {{ states('input_number.hvac_overnight_cool_f') | int }}
          {% endif %}
    - action: climate.set_temperature
      target:
        entity_id: climate.smart_thermostat
      data:
        hvac_mode: heat_cool
        target_temp_low: "{{ heat_min }}"
        target_temp_high: "{{ cool_max }}"

# ===========================================================================
#  LIVINGROOM — thermal tracking (not occupied)
# ===========================================================================
# Keeps livingroom within ±band of avg(kitchen sensor, amos sensor).
# Uses BLE thermometers for reference, livingroom AC's built-in sensor
# for the room temp.
#
# Availability: both BLE sensors must be reporting. If either goes
# unavailable, the automation skips (condition gate) rather than
# computing with stale/zero values.

- alias: "HVAC Livingroom - Thermal Tracking"
  id: hvac_livingroom_thermal_tracking
  description: >
    Keeps livingroom within ±band of the average of kitchen + amos room
    temperatures. Livingroom is not directly occupied but must stay
    thermally coupled to adjacent zones. Uses direct MQTT.
    1.5°F deadband prevents rapid cycling.
    Skips if either BLE sensor is unavailable.
  triggers:
    - trigger: time_pattern
      minutes: "/10"
    - trigger: state
      entity_id: sensor.kitchen_temp_temperature
    - trigger: state
      entity_id: sensor.atc_48af_temperature
  conditions:
    - condition: state
      entity_id: input_boolean.hvac_master_enable
      state: "on"
    - condition: template
      value_template: >
        {{ states('sensor.kitchen_temp_temperature') not in ['unavailable','unknown']
           and states('sensor.atc_48af_temperature') not in ['unavailable','unknown'] }}
  actions:
    - variables:
        kitchen_temp: >
          {{ states('sensor.kitchen_temp_temperature') | float(0) }}
        amos_temp: >
          {{ states('sensor.atc_48af_temperature') | float(0) }}
        band: >
          {{ states('input_number.hvac_livingroom_thermal_band_f') | float(5) }}
        lr_temp: >
          {{ state_attr('climate.livingroom_ac', 'current_temperature') | float(0) }}
        deadband: 1.5
    - variables:
        avg_temp: >
          {{ ((kitchen_temp + amos_temp) / 2) | round(1) }}
        target_low: >
          {{ ((kitchen_temp + amos_temp) / 2 - band) | round(1) }}
        target_high: >
          {{ ((kitchen_temp + amos_temp) / 2 + band) | round(1) }}
    - variables:
        target_high_c: "{{ ((target_high - 32) * 5 / 9) | round(0) | int }}"
        target_low_c: "{{ ((target_low - 32) * 5 / 9) | round(0) | int }}"
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ lr_temp <= (target_low - deadband) }}"
          sequence:
            - action: mqtt.publish
              data:
                topic: cmnd/minisplit_livingroom/ACMode
                payload: heat
            - action: mqtt.publish
              data:
                topic: cmnd/minisplit_livingroom/TargetTemperature
                payload: "{{ target_low_c }}"
        - conditions:
            - condition: template
              value_template: "{{ lr_temp >= (target_high + deadband) }}"
          sequence:
            - action: mqtt.publish
              data:
                topic: cmnd/minisplit_livingroom/ACMode
                payload: cool
            - action: mqtt.publish
              data:
                topic: cmnd/minisplit_livingroom/TargetTemperature
                payload: "{{ target_high_c }}"
      default:
        - action: mqtt.publish
          data:
            topic: cmnd/minisplit_livingroom/ACMode
            payload: "off"

# ===========================================================================
#  SAFETY — turn everything off if master switch is disabled
# ===========================================================================

- alias: "HVAC Master Disable - All Off"
  id: hvac_master_disable
  description: >
    Turns off all HVAC units when master enable is toggled off.
    Uses both climate.set_hvac_mode (for HA entity state) and
    direct MQTT (to ensure Della units actually stop).
  triggers:
    - trigger: state
      entity_id: input_boolean.hvac_master_enable
      to: "off"
  actions:
    - action: climate.set_hvac_mode
      target:
        entity_id:
          - climate.kitchen_ac
          - climate.livingroom_ac
          - climate.amos_bedroom_ac
          - climate.smart_thermostat
      data:
        hvac_mode: "off"
    - action: mqtt.publish
      data:
        topic: cmnd/minisplit_kitchen/ACMode
        payload: "off"
    - action: mqtt.publish
      data:
        topic: cmnd/minisplit_amos/ACMode
        payload: "off"
    - action: mqtt.publish
      data:
        topic: cmnd/minisplit_livingroom/ACMode
        payload: "off"
