          data:
            hvac_mode: "off"

# ===========================================================================
#  4. HALLWAY — schedule-driven heat_cool dual setpoint
# ===========================================================================

- alias: "HVAC Hallway - Zone Control"
  id: hvac_hallway_zone
  description: >
    Controls hallway thermostat (Matter) based on active schedule period.
    Uses heat_cool mode — the thermostat manages its own deadband.
  triggers:
    - trigger: state
      entity_id: input_select.hvac_schedule_period
    - trigger: state
      entity_id:
        - input_number.hvac_early_morning_heat_f
        - input_number.hvac_early_morning_cool_f
        - input_number.hvac_morning_heat_f
        - input_number.hvac_morning_cool_f
        - input_number.hvac_daytime_heat_f
        - input_number.hvac_daytime_cool_f
        - input_number.hvac_overnight_heat_f
        - input_number.hvac_overnight_cool_f
    - trigger: time_pattern
      minutes: "/15"
  conditions:
    - condition: state
      entity_id: input_boolean.hvac_master_enable
      state: "on"
  actions:
    - variables:
        period: "{{ states('input_select.hvac_schedule_period') }}"
        heat_min: "{{ states('input_number.hvac_' ~ period ~ '_heat_f') | float(65) }}"
        cool_max: "{{ states('input_number.hvac_' ~ period ~ '_cool_f') | float(75) }}"
    - action: climate.set_temperature
      target:
        entity_id: climate.smart_thermostat
      data:
        hvac_mode: heat_cool
        target_temp_low: "{{ heat_min }}"
        target_temp_high: "{{ cool_max }}"

# ===========================================================================
#  5. LIVINGROOM — thermal tracking
# ===========================================================================

- alias: "HVAC Livingroom - Thermal Tracking"
  id: hvac_livingroom_thermal_tracking
  description: >
    Keeps livingroom within ±band of avg(kitchen, amos) sensor temps.
    Uses climate entity calls. 2°F deadband prevents rapid cycling.
    Skips if either BLE sensor is unavailable.
  triggers:
    - trigger: time_pattern
      minutes: "/10"
    - trigger: state
      entity_id: sensor.kitchen_temp_temperature
    - trigger: state
      entity_id: sensor.atc_48af_temperature
  conditions:
    - condition: state
      entity_id: input_boolean.hvac_master_enable
      state: "on"
    - condition: not
      conditions:
        - condition: state
          entity_id: climate.livingroom_ac
          state: "unavailable"
    - condition: template
      value_template: >
        {{ states('sensor.kitchen_temp_temperature') not in ['unavailable','unknown']
           and states('sensor.atc_48af_temperature') not in ['unavailable','unknown'] }}
  actions:
    - variables:
        kitchen_temp: "{{ states('sensor.kitchen_temp_temperature') | float(0) }}"
        amos_temp: "{{ states('sensor.atc_48af_temperature') | float(0) }}"
        band: "{{ states('input_number.hvac_livingroom_thermal_band_f') | float(5) }}"
        lr_temp: "{{ state_attr('climate.livingroom_ac', 'current_temperature') | float(0) }}"
        current_mode: "{{ states('climate.livingroom_ac') }}"
        deadband: 2
    - variables:
        avg_temp: "{{ ((kitchen_temp + amos_temp) / 2) | round(1) }}"
        target_low: "{{ (avg_temp - band) | round(1) }}"
        target_high: "{{ (avg_temp + band) | round(1) }}"
    - choose:
        - conditions:
            - condition: template
              value_template: >
                {{ lr_temp < target_low and
                   (current_mode == 'heat' or lr_temp <= target_low - deadband) }}
          sequence:
            - action: climate.set_temperature
              target:
                entity_id: climate.livingroom_ac
              data:
                temperature: "{{ target_low }}"
                hvac_mode: heat
        - conditions:
            - condition: template
              value_template: >
                {{ lr_temp > target_high and
                   (current_mode == 'cool' or lr_temp >= target_high + deadband) }}
          sequence:
            - action: climate.set_temperature
              target:
                entity_id: climate.livingroom_ac
              data:
                temperature: "{{ target_high }}"
                hvac_mode: cool
      default:
        - condition: template
          value_template: "{{ current_mode != 'off' }}"
        - action: climate.set_hvac_mode
          target:
            entity_id: climate.livingroom_ac
          data:
            hvac_mode: "off"

# ===========================================================================
#  6. SAFETY — master disable
# ===========================================================================

- alias: "HVAC Master Disable - All Off"
  id: hvac_master_disable
  description: >
    Turns off all HVAC units when master enable is toggled off.
  triggers:
    - trigger: state
      entity_id: input_boolean.hvac_master_enable
      to: "off"
  actions:
    - action: climate.set_hvac_mode
      target:
        entity_id:
          - climate.kitchen_ac
          - climate.livingroom_ac
          - climate.amos_bedroom_ac
          - climate.smart_thermostat
      data:
        hvac_mode: "off"
