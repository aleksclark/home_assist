# ===========================================================================
#  HALLWAY — schedule-driven heat_cool dual setpoint
# ===========================================================================

- alias: "HVAC Hallway - Schedule Control"
  id: hvac_hallway_schedule
  description: >
    Controls hallway thermostat (Matter) based on 4-period daily schedule.
    Uses heat_cool mode with dual setpoints for min/max band.
  triggers:
    - trigger: time
      at: "05:30:00"
    - trigger: time
      at: "06:30:00"
    - trigger: time
      at: "08:30:00"
    - trigger: time
      at: "21:00:00"
    - trigger: time_pattern
      minutes: "/10"
  conditions:
    - condition: state
      entity_id: input_boolean.hvac_master_enable
      state: "on"
  actions:
    - variables:
        now_minutes: >
          {{ now().hour * 60 + now().minute }}
    - variables:
        heat_min: >
          {% if 330 <= now_minutes < 390 %}
            {{ states('input_number.hvac_early_morning_heat_f') | float }}
          {% elif 390 <= now_minutes < 510 %}
            {{ states('input_number.hvac_morning_heat_f') | float }}
          {% elif 510 <= now_minutes < 1260 %}
            {{ states('input_number.hvac_daytime_heat_f') | float }}
          {% else %}
            {{ states('input_number.hvac_overnight_heat_f') | float }}
          {% endif %}
        cool_max: >
          {% if 330 <= now_minutes < 390 %}
            {{ states('input_number.hvac_early_morning_cool_f') | float }}
          {% elif 390 <= now_minutes < 510 %}
            {{ states('input_number.hvac_morning_cool_f') | float }}
          {% elif 510 <= now_minutes < 1260 %}
            {{ states('input_number.hvac_daytime_cool_f') | float }}
          {% else %}
            {{ states('input_number.hvac_overnight_cool_f') | float }}
          {% endif %}
    - action: climate.set_temperature
      target:
        entity_id: climate.smart_thermostat
      data:
        hvac_mode: heat_cool
        target_temp_low: "{{ heat_min }}"
        target_temp_high: "{{ cool_max }}"

# ===========================================================================
#  LIVINGROOM — thermal tracking (not occupied)
# ===========================================================================
# Keeps livingroom within ±5°F of avg(kitchen sensor, amos sensor).
# Uses BLE thermometers for reference, livingroom AC's built-in sensor
# for the room temp.

- alias: "HVAC Livingroom - Thermal Tracking"
  id: hvac_livingroom_thermal_tracking
  description: >
    Keeps livingroom within 5°F of the average of kitchen + amos room
    temperatures. Livingroom is not directly occupied but must stay
    thermally coupled to adjacent zones.
  triggers:
    - trigger: time_pattern
      minutes: "/10"
    - trigger: state
      entity_id: sensor.kitchen_temp_temperature
    - trigger: state
      entity_id: sensor.atc_48af_temperature
  conditions:
    - condition: state
      entity_id: input_boolean.hvac_master_enable
      state: "on"
    - condition: template
      value_template: >
        {{ states('sensor.kitchen_temp_temperature') not in ['unavailable','unknown']
           and states('sensor.atc_48af_temperature') not in ['unavailable','unknown'] }}
  actions:
    - variables:
        kitchen_temp: >
          {{ states('sensor.kitchen_temp_temperature') | float(0) }}
        amos_temp: >
          {{ states('sensor.atc_48af_temperature') | float(0) }}
        band: >
          {{ states('input_number.hvac_livingroom_thermal_band_f') | float(5) }}
        lr_temp: >
          {{ state_attr('climate.livingroom_ac', 'current_temperature') | float(0) }}
    - variables:
        avg_temp: >
          {{ ((kitchen_temp + amos_temp) / 2) | round(1) }}
        target_low: >
          {{ ((kitchen_temp + amos_temp) / 2 - band) | round(1) }}
        target_high: >
          {{ ((kitchen_temp + amos_temp) / 2 + band) | round(1) }}
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ lr_temp <= target_low }}"
          sequence:
            - action: climate.set_temperature
              target:
                entity_id: climate.livingroom_ac
              data:
                temperature: "{{ target_low }}"
                hvac_mode: heat
        - conditions:
            - condition: template
              value_template: "{{ lr_temp >= target_high }}"
          sequence:
            - action: climate.set_temperature
              target:
                entity_id: climate.livingroom_ac
              data:
                temperature: "{{ target_high }}"
                hvac_mode: cool
      default:
        - action: climate.set_hvac_mode
          target:
            entity_id: climate.livingroom_ac
          data:
            hvac_mode: "off"

# ===========================================================================
#  SAFETY — turn everything off if master switch is disabled
# ===========================================================================

- alias: "HVAC Master Disable - All Off"
  id: hvac_master_disable
  triggers:
    - trigger: state
      entity_id: input_boolean.hvac_master_enable
      to: "off"
  actions:
    - action: climate.set_hvac_mode
      target:
        entity_id:
          - climate.kitchen_ac
          - climate.livingroom_ac
          - climate.amos_bedroom_ac
          - climate.smart_thermostat
      data:
        hvac_mode: "off"
