# ===========================================================================
#  GIRLS BEDROOM — pre-cool / pre-heat before sleep
# ===========================================================================
# girls_bedroom has no dedicated unit; it relies on central AC.
# At 16:00 (occupied start), central is already running occupied targets.
# At 22:00 (sleep), central has already shifted to sleep targets at 21:00.
# No extra automation needed — the central schedule covers it.
# If the girls room consistently runs warm/cold, consider adding a
# dedicated minisplit or a vent-boost automation here.

# ===========================================================================
#  CROSS-SYSTEM COORDINATION
# ===========================================================================

# --- Prevent minisplits from fighting central AC -------------------------
# If the ecobee is actively heating, don't let a nearby minisplit cool
# (and vice versa).  The green_room is the thermal bridge between the
# minisplit side (kitchen) and the central side (hallway).

- alias: "HVAC Conflict Guard - Disable Minisplit Cool While Central Heats"
  id: hvac_conflict_guard_cool
  triggers:
    - trigger: state
      entity_id: climate.ecobee
      attribute: hvac_action
      to: "heating"
  conditions:
    - condition: state
      entity_id: input_boolean.hvac_master_enable
      state: "on"
  actions:
    - action: climate.set_hvac_mode
      target:
        entity_id:
          - climate.kitchen_ac
          - climate.livingroom_ac
          - climate.amos_bedroom_ac
      data:
        hvac_mode: "off"
    - action: persistent_notification.create
      data:
        title: "HVAC Conflict Guard"
        message: "Minisplits turned off — central system is heating."

- alias: "HVAC Conflict Guard - Disable Minisplit Heat While Central Cools"
  id: hvac_conflict_guard_heat
  triggers:
    - trigger: state
      entity_id: climate.ecobee
      attribute: hvac_action
      to: "cooling"
  conditions:
    - condition: state
      entity_id: input_boolean.hvac_master_enable
      state: "on"
    - condition: template
      value_template: >
        {{ state_attr('climate.kitchen_ac', 'hvac_action') == 'heating'
           or state_attr('climate.livingroom_ac', 'hvac_action') == 'heating'
           or state_attr('climate.amos_bedroom_ac', 'hvac_action') == 'heating' }}
  actions:
    - action: climate.set_hvac_mode
      target:
        entity_id:
          - climate.kitchen_ac
          - climate.livingroom_ac
          - climate.amos_bedroom_ac
      data:
        hvac_mode: "off"
    - action: persistent_notification.create
      data:
        title: "HVAC Conflict Guard"
        message: "Minisplits turned off — central system is cooling and minisplits were heating."

# --- Restore minisplits after central finishes its cycle -----------------
- alias: "HVAC Conflict Guard - Restore Minisplits After Central Idle"
  id: hvac_conflict_guard_restore
  triggers:
    - trigger: state
      entity_id: climate.ecobee
      attribute: hvac_action
      to: "idle"
      for:
        minutes: 5
  conditions:
    - condition: state
      entity_id: input_boolean.hvac_master_enable
      state: "on"
  actions:
    - action: climate.set_hvac_mode
      target:
        entity_id:
          - climate.kitchen_ac
          - climate.livingroom_ac
          - climate.amos_bedroom_ac
      data:
        hvac_mode: >
          {% if is_state('input_boolean.hvac_season_cool', 'on') %}cool{% else %}heat{% endif %}
    - action: persistent_notification.create
      data:
        title: "HVAC Conflict Guard"
        message: "Central idle for 5 min — minisplits restored."

# ===========================================================================
#  SAFETY — turn everything off if master switch is disabled
# ===========================================================================

- alias: "HVAC Master Disable - All Off"
  id: hvac_master_disable
  triggers:
    - trigger: state
      entity_id: input_boolean.hvac_master_enable
      to: "off"
  actions:
    - action: climate.set_hvac_mode
      target:
        entity_id:
          - climate.kitchen_ac
          - climate.livingroom_ac
          - climate.amos_bedroom_ac
          - climate.ecobee
      data:
        hvac_mode: "off"
