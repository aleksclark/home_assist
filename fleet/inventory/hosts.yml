# Fleet Inventory
# Add machines as they're bootstrapped. Group by role.
#
# Naming convention: short hostname, defined in host_vars/<name>.yml
# for per-machine disk layout and specs.

all:
  vars:
    ansible_user: aleks
    ansible_become: true
    ansible_python_interpreter: /usr/bin/python3

  children:
    # Consul + Nomad server (control plane) — currently the workstation
    servers:
      hosts:
        # workstation:
        #   ansible_host: 192.168.0.2
        #   consul_server: true
        #   nomad_server: true

    # All fleet nodes (old desktops)
    nodes:
      children:
        storage:
          hosts:
            # Blockyard storage nodes — machines with data disks
            node-1:
              ansible_host: 192.168.0.23
            node-2:
              ansible_host: 192.168.0.24
            node-3:
              ansible_host: 192.168.0.89

        compute:
          hosts:
            # Docker container workload nodes
            node-1:
              ansible_host: 192.168.0.23
            node-2:
              ansible_host: 192.168.0.24
            node-3:
              ansible_host: 192.168.0.89
