---
- name: Harden sshd_config
  ansible.builtin.template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config
    mode: "0600"
    backup: true
    validate: "sshd -t -f %s"
  notify: restart sshd

- name: Enable and start sshd
  ansible.builtin.systemd:
    name: sshd
    enabled: true
    state: started
