---
# Base role: Arch Linux baseline for all fleet nodes

- name: Configure pacman mirrorlist
  import_tasks: pacman.yml
  tags: [pacman, packages]

- name: Create admin user
  import_tasks: users.yml
  tags: [users]

- name: Configure SSH
  import_tasks: ssh.yml
  tags: [ssh]

- name: Configure btrfs snapshots
  import_tasks: snapper.yml
  tags: [snapper, snapshots]

- name: System tuning
  import_tasks: sysctl.yml
  tags: [sysctl]

- name: Install base packages
  ansible.builtin.package:
    name: "{{ base_packages }}"
    state: present
    update_cache: true
  tags: [packages]

- name: Enable NTP
  ansible.builtin.systemd:
    name: systemd-timesyncd
    enabled: true
    state: started
  tags: [ntp]

- name: Set hostname
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"
  tags: [hostname]

- name: Set timezone
  community.general.timezone:
    name: America/Chicago
  tags: [timezone]
