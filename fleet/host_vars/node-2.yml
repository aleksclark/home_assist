# node-2 — Dell OptiPlex 9010
# Bootstrapped: 2026-04-10
# Role: storage + compute
# Boot: BIOS (no UEFI)

ansible_host: 192.168.0.24

# Hardware specs
machine_cpu_cores: 8
machine_ram_gb: 16
machine_gpu: false

# OS disk — btrfs root (Crucial M4 SSD)
os_disk: /dev/sdb

# Data disks for blockyard — XFS formatted
blockyard_data_disks:
  - device: /dev/sda
    mount: /data/disk0
    label: byard-data0
  - device: /dev/sdc
    mount: /data/disk1
    label: byard-data1

# Nomad node class — both roles
nomad_node_class: "storage-compute"

# Blockyard cluster seed — join via node-1
blockyard_seed_nodes:
  - "192.168.0.23"
nomad_meta:
  storage: "true"
  compute: "true"
  disk_total_tb: "7.2"
