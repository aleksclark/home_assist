# node-3 — Dell OptiPlex 7020
# Bootstrapped: 2026-04-10
# Role: MooseFS chunkserver, compute
# Boot: BIOS (no UEFI)

ansible_host: 192.168.0.89

# Hardware specs
machine_cpu_cores: 4
machine_ram_gb: 8
machine_gpu: false

# OS disk — btrfs root (320GB WD HDD)
os_disk: /dev/sdc

# Data disks — MooseFS chunkserver (XFS)
moosefs_data_disks:
  - mount: /data/disk0
    uuid: ""  # WD 3.6TB — sda
    size_tb: 3.6
  - mount: /data/disk1
    uuid: ""  # IBM 1.8TB — sdb
    size_tb: 1.8
  - mount: /data/disk2
    uuid: ""  # IBM 1.8TB — sdd
    size_tb: 1.8

# Network
network_bond: true
network_primary_nic: eno1       # Intel 1G (cable removed)
network_secondary_nic: enp4s0   # Realtek 2.5G

# Nomad
nomad_node_class: "storage-compute"
nomad_meta:
  storage: "true"
  compute: "true"
  disk_total_tb: "7.2"
